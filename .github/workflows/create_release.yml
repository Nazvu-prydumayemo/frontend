name: Create Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0)"
        required: true
        default: "v0.0.1"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            exe_name: NP-Tennis.exe
            asset_name: NP-Tennis-windows_${{ github.event.inputs.version }}.exe
          - os: ubuntu-latest
            exe_name: NP-Tennis
            asset_name: NP-Tennis-linux_${{ github.event.inputs.version }}
          - os: macos-latest
            exe_name: NP-Tennis
            asset_name: NP-Tennis-macos_${{ github.event.inputs.version }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyinstaller && pip install -e .

      - name: Write .env file from secrets
        shell: bash
        run: |
          cat > .env <<EOF
          SERVICE_NAME=${{ secrets.SERVICE_NAME }}
          KEY_NAME=${{ secrets.KEY_NAME }}
          API_URL=${{ secrets.API_URL }}
          EOF

      - name: Build executable
        run: python build.py

      - name: Rename binary to platform asset name
        shell: bash
        run: mv dist/${{ matrix.exe_name }} dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.0
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: NP-Tennis ${{ github.event.inputs.version }}
          files: dist/*
          draft: true
          prerelease: false
